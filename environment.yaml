name: hdn_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - numpy=1.23.5
  - pandas=1.5.3
  - scipy
  - scikit-image
  - scikit-learn
  - matplotlib
  - tqdm

  # PyTorch with CUDA (adjust version if needed)
  - pytorch=2.2.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1

  # Image & experiment utilities
  - pillow
  - pyyaml
  - json5

  # Optional but helpful
  - ipython
  - jupyterlab

  - pip:
      - opencv-python
      - seaborn
      - einops
